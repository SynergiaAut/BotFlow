name: Deploy to Hostinger

on:
  push:
    branches:
      - main   # se dispara cada vez que haces push a main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy a Hostinger vía FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /public_html/skylab/   # ajusta si el subdominio usa otra ruta
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
